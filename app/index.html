<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fbf9f4" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet" />
    <meta name="description" content="작은 습관을 만들고 매일 기록하는 반응형 습관 앱" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <title>작은 습관 조각</title>
  </head>
  <body>
    <a class="skip-link" href="#mainContent">본문으로 이동</a>

    <div id="app" class="app-shell">
      <header class="app-header">
        <button class="back-button" data-view-target="today" type="button" aria-label="뒤로">‹</button>
        <div class="avatar" aria-hidden="true">🌿</div>
        <div class="title-wrap">
          <p class="screen-date" id="todayLabel"></p>
          <h1 id="viewTitle">작은 성공</h1>
        </div>
        <button class="settings-button" id="installButton" type="button" hidden>설치</button>
        <button class="settings-button sync-trigger" id="syncButton" type="button" aria-label="동기화" hidden>동기화</button>
        <button class="settings-button" type="button" aria-label="설정">⌘</button>
      </header>

      <main class="main-panel" id="mainContent">
        <section id="todayView" class="view is-visible" aria-labelledby="viewTitle">
          <div class="today-progress">
            <div class="progress-kicker">
              <span>오늘 점수판</span>
              <strong id="todayScoreText">0 / 0</strong>
            </div>
            <div class="progress-ring" aria-label="오늘 진행률">
              <svg viewBox="0 0 120 120">
                <defs>
                  <linearGradient id="ringGradient" x1="20" y1="20" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#99f4d1"></stop>
                    <stop offset="58%" stop-color="#55c79d"></stop>
                    <stop offset="100%" stop-color="#006c51"></stop>
                  </linearGradient>
                </defs>
                <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
                <circle class="ring-value" id="ringValue" cx="60" cy="60" r="50"></circle>
              </svg>
              <div class="ring-center">
                <strong id="ringText">0%</strong>
                <span>오늘의 성공</span>
              </div>
            </div>
            <strong id="todayPercent" class="sr-only">0%</strong>
            <p id="todayMessage">작은 시작을 기다리고 있어요.</p>
            <div class="progress-stats" aria-label="오늘 달성 요약">
              <span><strong id="doneCountText">0</strong> 완료</span>
              <span><strong id="partialCountText">0</strong> 반달성</span>
              <span><strong id="remainingCountText">0</strong> 남음</span>
            </div>
          </div>

          <div class="section-head">
            <h2>오늘의 리듬</h2>
            <button class="icon-pill" data-view-target="add" type="button">+</button>
          </div>
          <div id="todayList" class="habit-list"></div>
        </section>

        <section id="habitsView" class="view" aria-labelledby="viewTitle">
          <div class="toolbar">
            <label class="search-box">
              <span>검색</span>
              <input id="searchInput" type="search" placeholder="습관 이름 검색" />
            </label>
            <select id="categoryFilter" aria-label="카테고리 필터">
              <option value="all">전체</option>
              <option value="health">건강</option>
              <option value="mind">마음</option>
              <option value="study">공부</option>
              <option value="life">생활</option>
            </select>
          </div>
          <div id="habitList" class="habit-grid"></div>
        </section>

        <section id="addView" class="view" aria-labelledby="viewTitle">
          <form id="habitForm" class="form-panel">
            <input type="hidden" id="editingId" />
            <label>
              <span>습관 목표</span>
              <input id="habitName" maxlength="32" required placeholder="나는 뭘 하고 싶어요..." />
            </label>
            <label>
              <span>바로 시작할 첫 조각</span>
              <input id="habitMicro" maxlength="44" required placeholder="예: 운동화 현관에 두기" />
            </label>

            <fieldset class="category-field">
              <legend>카테고리</legend>
              <label>
                <input type="radio" name="categoryChoice" value="health" checked />
                <span>건강</span>
              </label>
              <label>
                <input type="radio" name="categoryChoice" value="mind" />
                <span>마음</span>
              </label>
              <label>
                <input type="radio" name="categoryChoice" value="study" />
                <span>자기계발</span>
              </label>
            </fieldset>

            <div class="form-row">
              <label>
                <span>카테고리</span>
                <select id="habitCategory">
                  <option value="health">건강</option>
                  <option value="mind">마음</option>
                  <option value="study">공부</option>
                  <option value="life">생활</option>
                </select>
              </label>
              <label>
                <span>목표 시간</span>
                <input id="habitTime" type="time" value="09:00" />
              </label>
            </div>

            <label>
              <span>작게 나눈 순서</span>
              <textarea id="habitSteps" rows="4" placeholder="한 줄에 하나씩 적어줘&#10;신발끈 묶기&#10;현관문 열기&#10;5분만 걷기"></textarea>
            </label>

            <div class="reminder-row">
              <div>
                <strong>부드러운 알림</strong>
                <span>예정 시간에 살짝 알려줄게요</span>
              </div>
              <span class="switch" aria-hidden="true"></span>
            </div>

            <div class="form-actions">
              <button class="secondary-button" id="cancelEdit" type="button">취소</button>
              <button class="primary-button" type="submit">작은 습관 저장하기</button>
            </div>
          </form>
        </section>

        <section id="detailView" class="view" aria-labelledby="viewTitle">
          <div id="detailPanel"></div>
        </section>

        <section id="statsView" class="view" aria-labelledby="viewTitle">
          <div class="stats-grid">
            <article class="stat-card warm">
              <span>연속 달성</span>
              <strong id="streakStat">0일</strong>
            </article>
            <article class="stat-card green">
              <span>전체 점수</span>
              <strong id="totalStat">0회</strong>
            </article>
            <article class="stat-card">
              <span>등록 습관</span>
              <strong id="habitStat">0개</strong>
            </article>
          </div>

          <div class="chart-panel">
            <div class="section-head compact">
              <h2 id="monthChartTitle">월간 흐름</h2>
              <span id="monthlyGrowth" class="growth-chip">지난달 비교</span>
            </div>
            <div id="monthChart" class="month-chart" aria-label="월간 습관 달성 점수 차트"></div>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="하단 메뉴">
        <button class="nav-item is-active" data-view="today" type="button"><span>◎</span>오늘</button>
        <button class="nav-item" data-view="habits" type="button"><span>▦</span>습관</button>
        <button class="nav-item" data-view="add" type="button"><span>＋</span>추가</button>
        <button class="nav-item" data-view="stats" type="button"><span>▣</span>통계</button>
      </nav>
    </div>

    <dialog id="syncDialog" class="sync-dialog">
      <form method="dialog" class="sync-panel">
        <div class="sync-head">
          <div>
            <p class="eyebrow">기기 동기화</p>
            <h2>폰과 같은 기록 쓰기</h2>
          </div>
          <button class="settings-button" value="close" type="submit" aria-label="닫기">×</button>
        </div>
        <p class="sync-copy" id="syncStatus">동기화 설정을 확인하고 있어요.</p>
        <label class="sync-code-field">
          <span>동기화 코드</span>
          <input id="syncKeyInput" autocomplete="off" spellcheck="false" placeholder="PC에서 만든 코드를 폰에 붙여넣기" />
        </label>
        <div class="sync-actions">
          <button class="secondary-button" id="createSyncKey" type="button">새 코드 만들기</button>
          <button class="primary-button" id="connectSyncKey" type="button">이 코드로 연결</button>
        </div>
        <div class="sync-actions">
          <button class="secondary-button" id="copySyncKey" type="button">코드 복사</button>
          <button class="secondary-button" id="pullSyncNow" type="button">지금 불러오기</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
