<script>
        function createConfetti(btn) {
            const rect = btn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            const colors = ['#006c51', '#7dd8b5', '#ffae6f', '#a9c9f0', '#ffb780', '#d0e4ff'];
            const particleCount = 40;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti-particle';
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.backgroundColor = color;
                
                // Random start spread around button
                const startX = x + (Math.random() - 0.5) * 40;
                const startY = y + (Math.random() - 0.5) * 40;
                
                // Random fall distance and spread
                const endX = startX + (Math.random() - 0.5) * 200;
                const endY = startY + Math.random() * 200 + 100;
                
                particle.style.left = startX + 'px';
                particle.style.top = startY + 'px';
                
                document.body.appendChild(particle);
                
                const duration = Math.random() * 1000 + 800; // 0.8s to 1.8s
                
                particle.animate([
                    { transform: 'translate(0, 0) rotate(0deg) scale(1)', opacity: 1 },
                    { transform: `translate(${endX - startX}px, ${endY - startY}px) rotate(${Math.random() * 720}deg) scale(0.5)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)', // ease-out style
                    fill: 'forwards'
                });
                
                // Cleanup
                setTimeout(() => {
                    particle.remove();
                }, duration);
            }
        }

        function toggleHabit(btn, animate) {
            // Simple interaction logic for demonstration
            const isCompleted = btn.classList.contains('bg-primary');
            
            if (isCompleted) {
                // Revert to pending
                btn.className = "w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center text-transparent hover:border-primary transition-colors scale-95 active:scale-90";
                
                // Revert title styling
                const title = btn.parentElement.querySelector('h3');
                title.classList.remove('line-through', 'text-opacity-50');
                
                // Revert icon bg
                const iconBg = btn.parentElement.querySelector('.w-10');
                iconBg.classList.replace('bg-primary-container/20', 'bg-surface-variant');
                iconBg.classList.replace('text-primary', 'text-on-surface-variant');

            } else {
                // Mark complete
                btn.className = "w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary scale-95 active:scale-90 transition-transform pulse-active";
                
                // Remove pulse class after animation
                setTimeout(() => {
                    btn.classList.remove('pulse-active');
                }, 500);
                
                // Trigger confetti animation
                createConfetti(btn);

                // Style title
                const title = btn.parentElement.querySelector('h3');
                title.classList.add('line-through', 'text-opacity-50');

                // Style icon bg
                const iconBg = btn.parentElement.querySelector('.w-10');
                iconBg.classList.replace('bg-surface-variant', 'bg-primary-container/20');
                iconBg.classList.replace('text-on-surface-variant', 'text-primary');
            }
        }
    </script>
